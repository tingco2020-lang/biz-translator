  .scrim {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 85%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 22px 22px max(28px, env(safe-area-inset-bottom));
    max-width: 540px;
    margin: 0 auto;
  }

  .topbar { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--serif); font-style: italic; font-size: 15px; color: rgba(255,255,255,0.85); }
  .logo b { font-style: normal; font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; margin-left: 6px; opacity: 0.65; }

  .top-actions { display: flex; gap: 4px; }
  .icon-btn {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 0.5px solid rgba(255,255,255,0.18);
    color: white; padding: 7px 12px; font: inherit; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    border-radius: 999px; cursor: pointer; transition: all 0.18s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }

  .stage { margin-top: auto; padding-bottom: 4px; }

  .headline-area { text-align: center; margin-bottom: 28px; min-height: 100px; display: flex; align-items: flex-end; justify-content: center; }

  .headline {
    font-family: var(--serif-kr);
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 400;
    line-height: 1.5;
    color: white;
    text-shadow: 0 2px 24px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4);
    letter-spacing: -0.005em;
  }

  .result { display: none; text-align: left; width: 100%; max-width: 460px; margin: 0 auto; animation: rise 0.5s ease-out; }
  .result.visible { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-kicker {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 12px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }
  .result-trans {
    font-family: var(--serif-kr);
    font-size: clamp(20px, 4.5vw, 24px);
    line-height: 1.55;
    color: white;
    font-weight: 500;
    text-shadow: 0 2px 20px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.35);
    margin-bottom: 18px;
  }
  .result-trans strong {
    font-weight: 600;
    background: linear-gradient(180deg, transparent 60%, rgba(232,184,109,0.45) 60%);
    padding: 0 2px;
  }
  .result-orig {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    border-top: 0.5px solid rgba(255,255,255,0.18);
    padding-top: 10px;
  }
  .result-orig::before {
    content: '원래 문장 — ';
    font-family: var(--serif);
    font-style: italic;
    color: rgba(255,255,255,0.4);
  }

  .input-pill {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border-radius: 999px;
    padding: 4px 6px 4px 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.18), inset 0 0 0 0.5px rgba(255,255,255,0.6);
    margin-bottom: 12px;
  }
  .input-pill input {
    flex: 1;
    border: none; background: transparent; outline: none;
    font: inherit; font-family: var(--sans); font-size: 15px;
    color: var(--ink);
    padding: 13px 0;
    min-width: 0;
  }
  .input-pill input::placeholder { color: rgba(26,20,16,0.4); }

  .send-btn {
    background: var(--ink); color: white; border: none;
    width: 38px; height: 38px; border-radius: 50%;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    font-size: 16px;
  }
  .send-btn:hover:not(:disabled) { background: #5a2d1c; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.5; cursor: wait; }

  .chip-row {
    display: flex; gap: 6px;
    margin-bottom: 18px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 4px 2px;
    -webkit-overflow-scrolling: touch;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.92);
    padding: 7px 13px;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.18s ease;
    flex-shrink: 0;
  }
  .chip:hover { background: rgba(255,255,255,0.26); border-color: rgba(255,255,255,0.4); }

  .help-btn {
    display: block;
    margin: 0 auto;
    background: white;
    color: var(--ink);
    border: none;
    padding: 14px 32px;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 6px 28px rgba(0,0,0,0.22);
  }
  .help-btn:hover:not(:disabled) { background: #fffcf3; transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,0.28); }
  .help-btn:disabled { opacity: 0.6; cursor: wait; }
  .help-btn .arrow { display: inline-block; margin-left: 6px; transition: transform 0.2s; }
  .help-btn:hover .arrow { transform: translateX(4px); }

  .err {
    margin-top: 16px;
    text-align: center;
    color: #ffcab0;
    font-size: 13px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    font-family: var(--serif-kr);
  }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(10, 6, 3, 0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--paper);
    color: var(--ink);
    border-radius: 18px;
    padding: 32px 28px;
    max-width: 440px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }
  .modal-kicker { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #7A1F2C; font-weight: 600; margin-bottom: 12px; }
  .modal-title { font-family: var(--serif); font-size: 28px; line-height: 1.15; margin-bottom: 14px; font-weight: 500; color: var(--ink); }
  .modal-body { font-family: var(--serif-kr); font-size: 14px; line-height: 1.65; color: var(--ink-soft); margin-bottom: 18px; }
  .modal-body a { color: #7A1F2C; text-decoration: underline; text-underline-offset: 3px; }
  .modal-input {
    width: 100%; padding: 11px 14px;
    border: 0.5px solid rgba(26,20,16,0.2);
    background: #fafafa;
    border-radius: 10px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 13px;
    margin-bottom: 6px;
    outline: none;
    color: var(--ink);
  }
  .modal-input:focus { border-color: var(--ink); }
  .modal-hint { font-size: 11px; color: rgba(26,20,16,0.5); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 999px;
    border: none;
  }
  .modal-btn.primary { background: var(--ink); color: white; }
  .modal-btn.primary:hover { background: #2d1f17; }
  .modal-btn.secondary { background: transparent; color: var(--ink-soft); border: 0.5px solid rgba(26,20,16,0.2); }
  .modal-btn.secondary:hover { background: rgba(26,20,16,0.05); }

  .archive-list { list-style: none; }
  .archive-item { padding: 14px 0; border-bottom: 0.5px solid rgba(26,20,16,0.08); }
  .archive-item:last-child { border-bottom: none; }
  .archive-orig { font-family: var(--serif-kr); font-size: 12px; color: rgba(26,20,16,0.5); margin-bottom: 4px; }
  .archive-trans { font-family: var(--serif-kr); font-size: 14px; color: var(--ink); line-height: 1.55; }
  .archive-trans strong { color: #7A1F2C; font-weight: 600; }
  .archive-empty { text-align: center; padding: 32px 0; color: rgba(26,20,16,0.4); font-style: italic; font-family: var(--serif); font-size: 14px; }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: white; padding: 11px 20px;
    border-radius: 999px; font-size: 13px;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; animation: blink 1.4s infinite; }
  .loading-dots i:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots i:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  @media (min-width: 720px) {
    .container { padding: 32px 32px max(40px, env(safe-area-inset-bottom)); max-width: 600px; }
    .stage { padding-bottom: 12px; }
    .headline-area { min-height: 140px; }
  }
</style>
</head>
<body>
  <div class="scrim"></div>

  <div class="container">
    <div class="topbar">
      <div class="logo"><i>The Business Translator</i> <b>Vol. 01</b></div>
      <div class="top-actions">
        <button class="icon-btn" id="resetBtn" onclick="resetToInitial()" style="display: none;">↺ 처음으로</button>
        <button class="icon-btn" onclick="openArchive()">기록</button>
        <button class="icon-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>

    <div class="stage">
      <div class="headline-area">
        <div class="headline" id="headline">너 계속 그렇게<br>비전문적으로 말할거야?</div>
        <div class="result" id="result">
          <div class="result-kicker" id="resultKicker">이렇게 말해봐</div>
          <div class="result-trans" id="resultTrans"></div>
          <div class="result-orig" id="resultOrig"></div>
        </div>
      </div>

      <div class="input-pill">
        <input type="text" id="input" placeholder="하고싶은 말을 입력해 주세요." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="runTranslate()" aria-label="변환">→</button>
      </div>

      <div class="chip-row">
        <button class="chip" onclick="useChip(this)">오늘 회의 가기 싫다</button>
        <button class="chip" onclick="useChip(this)">이거 그냥 대충 했어</button>
        <button class="chip" onclick="useChip(this)">배고파</button>
        <button class="chip" onclick="useChip(this)">월요일 너무 별로다</button>
        <button class="chip" onclick="useChip(this)">그 사람 일 좀 못해</button>
      </div>

      <button class="help-btn" id="helpBtn" onclick="runTranslate()">도와줄게<span class="arrow">→</span></button>

      <div class="err" id="err" style="display: none;"></div>
    </div>
  </div>

  <div class="modal-bg" id="settingsModal">
    <div class="modal">
      <div class="modal-kicker">Setup</div>
      <div class="modal-title">Anthropic API 키를<br>입력해주세요</div>
      <div class="modal-body">
        본인의 API 키로 직접 Claude를 호출합니다. 키는 브라우저 로컬에만 저장되며 외부로 전송되지 않아요.
        <br><br>
        키 발급 → <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>
      </div>
      <input type="password" class="modal-input" id="keyInput" placeholder="sk-ant-..." autocomplete="off">
      <div class="modal-hint">사용 모델: claude-haiku-4-5 · 한 번 변환에 약 ₩5 이하</div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModals()">취소</button>
        <button class="modal-btn primary" onclick="saveKey()">저장</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="archiveModal">
    <div class="modal">
      <div class="modal-kicker">Archive</div>
      <div class="modal-title">지난 변환 기록</div>
      <ul class="archive-list" id="archiveList"></ul>
      <div class="modal-actions" style="margin-top: 24px;">
        <button class="modal-btn secondary" onclick="clearArchive()">전부 삭제</button>
        <button class="modal-btn primary" onclick="closeModals()">닫기</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'biz_translator_apikey';
  const HISTORY_KEY = 'biz_translator_history';
  const MODEL = 'claude-haiku-4-5-20251001';

  const SYSTEM_PROMPT = `당신은 "번역기"입니다. 사람이 아니라 번역기입니다.

당신의 역할은 딱 하나: 입력된 문장을 비즈니스 언어로 바꾸는 것.

절대 금지:
- 입력에 대해 답변하거나 조언하는 것
- "~하시는 게 좋겠어요", "~하시는 게 맞아요" 같이 상대방에게 말하는 것
- 질문에 대답하는 것
- 어떤 형태의 반응, 공감, 제안도 금지

오직 허용:
- 입력된 문장을 1인칭 화자가 비즈니스 상황에서 말하는 것처럼 다시 표현하기

예시:
입력: "배고파"
출력: **퍼포먼스 유지**를 위한 식사 인테이크가 필요한 시점입니다. (화자 본인이 배고프다는 말을 비즈니스 말투로 표현)

입력: "편평 말고 파장면 먹고 싶어"
출력: 오늘 식사는 파장면으로 **우선순위**를 정했습니다.

입력: "오늘 회의 가기 싫다"
출력: 오늘 미팅의 **전략적 가치**를 재검토 중입니다.

입력: "이거 그냥 대충 했어"
출력: **MVP 수준**으로 빠르게 딜리버리했고, 디테일은 다음 이터레이션에서 보강할 예정입니다.

입력: "그 사람 일 좀 못해"
출력: 해당 인력의 **딜리버리 퀄리티**에 대한 재평가가 필요한 시점입니다.

입력: "월요일 너무 별로다"
출력: 위클리 사이클 초입의 **컨텍스트 스위칭 코스트**가 높은 상태입니다.

형식:
- 변환된 문장만 출력. 설명, 라벨, 따옴표 없이.
- 1~2문장으로 짧고 명료하게.
- 핵심 키워드 1~2개에 **별표** 강조.
- 비즈니스 용어와 한국어 자연스럽게 혼용.`;

  const KICKERS = ['이렇게 말해봐', '이건 어때?', '이렇게는 어때?', '정리해줄게', '한번 들어봐'];

  function $(id) { return document.getElementById(id); }
  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function formatReply(s) { return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

  function showToast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function useChip(el) { $("input").value = el.textContent; runTranslate(); }

  function resetToInitial() {
    $('result').classList.remove('visible');
    $('headline').style.display = '';
    $('helpBtn').style.display = '';
    $('resetBtn').style.display = 'none';
    $('input').value = '';
    $('err').style.display = 'none';
    $('input').focus();
  }

  function openSettings() {
    closeModals();
    $('keyInput').value = localStorage.getItem(STORAGE_KEY) || '';
    $('settingsModal').classList.add('show');
    setTimeout(() => $('keyInput').focus(), 50);
  }
  function openArchive() {
    closeModals();
    renderArchive();
    $('archiveModal').classList.add('show');
  }
  function closeModals() {
    $('settingsModal').classList.remove('show');
    $('archiveModal').classList.remove('show');
  }
  function saveKey() {
    const v = $('keyInput').value.trim();
    if (!v) return;
    localStorage.setItem(STORAGE_KEY, v);
    closeModals();
    showToast('API 키가 저장되었습니다');
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch { return []; }
  }
  function saveHistory(arr) { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 30))); }
  function renderArchive() {
    const arr = loadHistory();
    const list = $('archiveList');
    if (!arr.length) {
      list.innerHTML = '<div class="archive-empty">아직 변환 기록이 없어요</div>';
      return;
    }
    list.innerHTML = arr.map(item => `
      <li class="archive-item">
        <div class="archive-orig">${escapeHtml(item.original)}</div>
        <div class="archive-trans">${formatReply(item.translated)}</div>
      </li>
    `).join('');
  }
  function clearArchive() {
    if (!confirm('아카이브를 전부 삭제할까요?')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderArchive();
    showToast('아카이브가 삭제되었습니다');
  }

  async function runTranslate() {
    const text = $('input').value.trim();
    if (!text) return;

    let key = localStorage.getItem(STORAGE_KEY);
    if (!key) { openSettings(); return; }

    const sendBtn = $('sendBtn');
    const helpBtn = $('helpBtn');
    const errEl = $('err');
    const headline = $('headline');
    const result = $('result');
    const resultKicker = $('resultKicker');
    const resultTrans = $('resultTrans');
    const resultOrig = $('resultOrig');

    errEl.style.display = 'none';
    sendBtn.disabled = true;
    helpBtn.disabled = true;

    headline.style.display = 'none';
    result.classList.add('visible');
    resultKicker.textContent = '안경 닦는 중';
    resultTrans.innerHTML = '<span class="loading-dots"><i></i><i></i><i></i></span>';
    resultOrig.textContent = text;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 400,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: text }]
        })
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();

      resultKicker.textContent = KICKERS[Math.floor(Math.random() * KICKERS.length)];
      resultTrans.innerHTML = formatReply(reply);

      const hist = loadHistory();
      hist.unshift({ original: text, translated: reply, ts: Date.now() });
      saveHistory(hist);

      $('input').value = '';
      $('helpBtn').style.display = 'none';
      $('resetBtn').style.display = '';
    } catch (err) {
      result.classList.remove('visible');
      headline.style.display = '';
      errEl.style.display = 'block';
      errEl.textContent = `오류: ${err.message}. API 키를 확인해주세요.`;
    } finally {
      sendBtn.disabled = false;
      if (helpBtn) helpBtn.disabled = false;
      $('input').focus();
    }
  }

  $('input').addEventListener('keydown', e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); runTranslate(); }
  });
  $('keyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModals();
  });
  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => { if (e.target === bg) closeModals(); });
  });

  (function init() {
    if (!localStorage.getItem(STORAGE_KEY)) {
      setTimeout(openSettings, 500);
    }
    const hist = loadHistory();
    if (hist.length) {
      const last = hist[0];
      $('headline').style.display = 'none';
      $('result').classList.add('visible');
      $('resultKicker').textContent = KICKERS[0];
      $('resultTrans').innerHTML = formatReply(last.translated);
      $('resultOrig').textContent = last.original;
      $('helpBtn').style.display = 'none';
      $('resetBtn').style.display = '';
    }
  })();
</script>
</body>
</html>
